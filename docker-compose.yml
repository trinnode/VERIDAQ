version: "3.9"

# ─── Services ────────────────────────────────────────────────────────────────

services:

  # PostgreSQL — primary data store
  postgres:
    image: postgres:16-alpine
    container_name: veridaq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       veridaq
      POSTGRES_USER:     veridaq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veridaq_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veridaq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis — BullMQ job queue + session cache
  redis:
    image: redis:7-alpine
    container_name: veridaq-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API server — Fastify
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: veridaq-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:            production
      DATABASE_URL:        postgresql://veridaq:${POSTGRES_PASSWORD:-veridaq_dev_password}@postgres:5432/veridaq
      REDIS_URL:           redis://redis:6379
      PORT:                ${PORT:-3001}
      JWT_SECRET:          ${JWT_SECRET}
      JWT_EXPIRES_IN:      ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN:         ${CORS_ORIGIN:-http://localhost:3000}
      LOG_LEVEL:           ${LOG_LEVEL:-info}
      CIRCUIT_WASM_PATH:   /app/packages/circuits/build/credential_js/credential.wasm
      CIRCUIT_ZKEY_PATH:   /app/packages/circuits/build/credential_final.zkey
      VERIFICATION_KEY_PATH: /app/packages/circuits/build/verificationKey.json
      STORAGE_DRIVER:      ${STORAGE_DRIVER:-local}
      LOCAL_STORAGE_DIR:   /app/uploads
      S3_BUCKET:           ${S3_BUCKET:-}
      S3_REGION:           ${S3_REGION:-}
      AWS_ACCESS_KEY:      ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY:      ${AWS_SECRET_KEY:-}
      SMTP_HOST:           ${SMTP_HOST:-}
      SMTP_PORT:           ${SMTP_PORT:-587}
      SMTP_USER:           ${SMTP_USER:-}
      SMTP_PASS:           ${SMTP_PASS:-}
      EMAIL_FROM:          ${EMAIL_FROM:-noreply@veridaq.ng}
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - uploads_data:/app/uploads

  # Background worker — BullMQ credential batch processor
  worker:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: veridaq-worker
    restart: unless-stopped
    command: ["node", "dist/jobs/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:            production
      DATABASE_URL:        postgresql://veridaq:${POSTGRES_PASSWORD:-veridaq_dev_password}@postgres:5432/veridaq
      REDIS_URL:           redis://redis:6379
      LOG_LEVEL:           ${LOG_LEVEL:-info}
      CIRCUIT_WASM_PATH:   /app/packages/circuits/build/credential_js/credential.wasm
      CIRCUIT_ZKEY_PATH:   /app/packages/circuits/build/credential_final.zkey
      VERIFICATION_KEY_PATH: /app/packages/circuits/build/verificationKey.json
      STORAGE_DRIVER:      ${STORAGE_DRIVER:-local}
      LOCAL_STORAGE_DIR:   /app/uploads
      S3_BUCKET:           ${S3_BUCKET:-}
      S3_REGION:           ${S3_REGION:-}
      AWS_ACCESS_KEY:      ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY:      ${AWS_SECRET_KEY:-}
      SMTP_HOST:           ${SMTP_HOST:-}
      SMTP_PORT:           ${SMTP_PORT:-587}
      SMTP_USER:           ${SMTP_USER:-}
      SMTP_PASS:           ${SMTP_PASS:-}
      EMAIL_FROM:          ${EMAIL_FROM:-noreply@veridaq.ng}
    volumes:
      - uploads_data:/app/uploads

# ─── Named volumes ───────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  uploads_data:
